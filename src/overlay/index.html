<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Recording Overlay</title>
    <!-- Stamp the theme before first paint; src/lib/theme.ts keeps it current.
         The storage key must match STORAGE_KEY in theme.ts. -->
    <script>
      const pref = localStorage.getItem("app-theme");
      document.documentElement.dataset.theme =
        pref === "light" || pref === "dark"
          ? pref
          : matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
    </script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/overlay/main.tsx"></script>
  </body>
</html>
